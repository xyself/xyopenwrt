name: N1

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  schedule:
    - cron: "0 0 */7 * *"  # 每 7 天运行一次

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: N1/268.config
  DIY_SH: N1/diy.sh
  FILES: N1/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

    - name: 检出代码
      uses: actions/checkout@v4

    - name: 释放磁盘空间
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get update -y
        sudo -E apt-get full-upgrade -y
        sudo -E apt-get install -y $(curl -fsSL https://raw.githubusercontent.com/nantayo/My-Pkg/master/2410)
        sudo -E apt-get autoremove --purge
        sudo -E apt-get clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$USER /workdir

    - name: 克隆源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 更新 & 安装 feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_SH

    - name: SSH 连接到 Actions
      uses: P3TERX/ssh2actions@main
      if: ${{ github.event.inputs.ssh == 'true' }}

    - name: 下载依赖包
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s

    - name: 打包 ARM 版本 OpenWrt
      if: ${{ success() && !cancelled() }}
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/*/*/*.tar.gz
        KERNEL_REPO_URL: breakingbadboy/OpenWrt
        KERNEL_VERSION_NAME: 6.6.y
        PACKAGE_SOC: s905d
        GZIP_IMGS: .xz
        SCRIPT_DIY_PATH: N1/mk_s905d_n1.sh
        WHOAMI: xyself
        OPENWRT_VER: ${{ github.run_number }}
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: 生成发布标签
      id: tag
      if: ${{ success() && !cancelled() }}
      run: |
        TAG_NAME="OpenWrt_$(date +'%Y.%m.%d-%H.%M')"
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

        echo "🍁 首次使用建议全新刷写" > release.txt
        echo "" >> release.txt
        echo "💻 适用机型: 斐讯N1" >> release.txt
        echo "📂 源码: $REPO_URL" >> release.txt
        echo "🌳 分支: $REPO_BRANCH" >> release.txt
        echo "⏱️ 编译时间: $(date +'%Y年%m月%d日 %H:%M')" >> release.txt
        echo "🌐 管理地址: 192.168.3.2" >> release.txt
        echo "👤 用户名: root" >> release.txt
        echo "🔒 密码: password" >> release.txt

    - name: 发布固件到 Releases
      if: ${{ success() && !cancelled() }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        files: openwrt/bin/**/*.img.xz
        body_path: release.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 发送 Telegram 通知
      if: ${{ always() }}
      continue-on-error: true
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        if [ -n "$TELEGRAM_TOKEN" ]; then
          if [ "${{ job.status }}" = "success" ]; then
            message="🎉 OpenWrt 编译成功"
          else
            message="❌ OpenWrt 编译失败"
          fi
          
          curl -s -k \
            --data chat_id="$TELEGRAM_CHAT_ID" \
            --data "text=$message" \
          "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage"
        fi
    - name: 删除旧的 Releases
      if: ${{ success() && !cancelled() }}
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 8
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
